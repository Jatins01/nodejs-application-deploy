name: Deploy Node.js Application to EC2 (CI/CD Pipeline)

on: # on every push in branch - main
 push:
  branches:
    - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    # step 1: Checkout Latest Code where your github actions runs
    steps: 
      - name: Checkout Code
        uses: actions/checkout@v4

    # step 2: Connect to EC2 and deploy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v4

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script:
            #Go to Project directory
            cd ~/nodejs-application-deploy

            #Pull latest code
            git pull origin main

            #Stop old containers
            docker compose down

            #Remove old unused images
            docker system prune -af

            #Build and start containers
            docker compose up -d --build

            #show running containers
            docker ps